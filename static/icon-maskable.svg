<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  
  <!-- Background rounded square (full bleed for maskable) -->
  <rect width="512" height="512" fill="url(#bgGradient)"/>
  
  <!-- Key icon (centered, larger for maskable) -->
  <g fill="white">
    <!-- Key head -->
    <circle cx="220" cy="256" r="85" fill="white"/>
    <circle cx="220" cy="256" r="42" fill="#7c3aed"/>
    
    <!-- Key shaft -->
    <rect x="305" y="230" width="150" height="52" rx="10" fill="white"/>
    
    <!-- Key teeth -->
    <rect x="425" y="230" width="30" height="38" rx="5" fill="white"/>
    <rect x="470" y="230" width="30" height="58" rx="5" fill="white"/>
  </g>
</svg>
