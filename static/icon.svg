<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="120" fill="url(#bgGradient)"/>
  
  <!-- Key icon -->
  <g filter="url(#shadow)" fill="white">
    <!-- Key head -->
    <circle cx="200" cy="256" r="70" fill="white"/>
    <circle cx="200" cy="256" r="35" fill="#7c3aed"/>
    
    <!-- Key shaft -->
    <rect x="270" y="236" width="130" height="40" rx="8" fill="white"/>
    
    <!-- Key teeth -->
    <rect x="370" y="236" width="25" height="30" rx="4" fill="white"/>
    <rect x="410" y="236" width="25" height="45" rx="4" fill="white"/>
  </g>
</svg>
